<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>계산기</title>
    <link rel="stylesheet" href="./calculator_style.css" />
  </head>
  <body>
    <main class="calculator" aria-label="계산기">
      <section class="display" aria-live="polite">
        <div class="expression" id="expression">0</div>
        <div class="result" id="result">0</div>
      </section>

      <section class="keys" aria-label="계산기 버튼">
        <button type="button" class="key utility" data-action="clear">C</button>
        <button type="button" class="key utility" data-action="backspace">DEL</button>
        <button type="button" class="key utility" data-value="(">(</button>
        <button type="button" class="key operator" data-value="/">÷</button>

        <button type="button" class="key" data-value="7">7</button>
        <button type="button" class="key" data-value="8">8</button>
        <button type="button" class="key" data-value="9">9</button>
        <button type="button" class="key operator" data-value="*">×</button>

        <button type="button" class="key" data-value="4">4</button>
        <button type="button" class="key" data-value="5">5</button>
        <button type="button" class="key" data-value="6">6</button>
        <button type="button" class="key operator" data-value="-">−</button>

        <button type="button" class="key" data-value="1">1</button>
        <button type="button" class="key" data-value="2">2</button>
        <button type="button" class="key" data-value="3">3</button>
        <button type="button" class="key operator" data-value="+">+</button>

        <button type="button" class="key wide" data-value="0">0</button>
        <button type="button" class="key" data-value=".">.</button>
        <button type="button" class="key equal" data-action="equals">=</button>
      </section>
    </main>

    <script src="./calculator.js" defer></script>
  </body>
</html>

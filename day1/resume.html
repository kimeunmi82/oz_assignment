<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Introduction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        h1, h2 {
            margin-top: 30px;
            margin-bottom: 10px;
        }
        .profile-section {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 20px;
        }
        .profile-img {
            width: 150px;
            height: auto;
            border: 1px solid #ccc;
        }
        .intro-text {
            margin-top: 10px;
            margin-bottom: 15px;
        }
        a {
            color: #551A8B;
            text-decoration: underline;
        }
        ul {
            list-style-type: square;
            padding-left: 20px;
        }
        ol {
            list-style-type: lower-roman;
            padding-left: 20px;
        }
        table {
            border-collapse: collapse;
            width: 500px;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid black;
            padding: 4px 8px;
            text-align: center;
        }
        hr {
            border: 0;
            border-top: 1px solid #ccc;
            margin: 20px 0;
        }
        .form-section {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
        }
        .form-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        input[type="text"], input[type="email"] {
            padding: 3px 5px;
            border: 1px solid #767676;
        }
        input[type="submit"] {
            padding: 3px 10px;
            background-color: #f0f0f0;
            border: 1px solid #767676;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Self Introduction</h1>
    
    <div class="profile-section">
        <!-- 이미지가 있을 경우 src 속성에 이미지 경로를 넣으세요 -->
        <img src="https://github.com/kimeunmi82/oz_assignment/blob/main/day1/photo.png?raw=true" alt="이력서 사진 이미지"" class="profile-img">
    </div>

    <div class="intro-text">
        Java 개발 역량을 바탕으로 AI 기술을 녹여내어, 의료 현장의 혁신을 이끄는 헬스케어 서비스를 개발하는 개발자입니다.
    </div>

    <div>
        <a href="https://github.com/kimeunmi82/oz_assignment.git">내 Repository 바로가기</a>
    </div>

    <ul>
        <li>이름: 김은미</li>
        <li>나이: 45살</li>
        <li>출생년도: 1982년</li>
        <li>성별: 여자</li>
        <li>거주지: 서울</li>
    </ul>

    <h2>Certification</h2>
    <hr>
    <ol>
        <li>정보처리기사</li>
    </ol>

    <h2>Career & Work Experience</h2>
    <hr>
    <table>
        <thead>
            <tr>
                <th style="width: 30%">회사명</th>
                <th style="width: 50%">직무</th>
                <th style="width: 50%">기간</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="max-width: fit-content;">크루메이트</td>
                <td>JAJVA 개발자, PL, PM</td>
                <td>2007.04~2026.02</td>
            </tr>
        </tbody>
    </table>

    <h2>Send Cover Letter</h2>
    <hr>
    <form action="#" method="POST" class="form-section">
        <div class="form-group">
            <label for="email">담당자 이메일:</label>
            <input type="email" id="email" name="email" placeholder="email@example.com">
        </div>
        
        <div class="form-group">
            <label for="company">회사명:</label>
            <input type="text" id="company" name="company" value="(주)Paper Company">
        </div>

        <input type="submit" value="이력서 전송하기">
    </form>

</body>
</html>
